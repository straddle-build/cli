name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      # Step-level guards test these so a missing secret skips the
      # dependent publish step instead of failing the whole release.
      HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
      NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Test
        run: go test ./...

      - name: GoReleaser
        run: go run github.com/goreleaser/goreleaser/v2@v2.15.4 release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v7
        if: env.NPM_TOKEN != ''
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Publish npm wrapper
        if: env.NPM_TOKEN != ''
        working-directory: npm
        run: |
          npm version --no-git-tag-version "${GITHUB_REF_NAME#v}"
          npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
