commands:
  test: "go build ./... && go test ./..."
  lint: "go vet ./... && go run github.com/golangci/golangci-lint/v2/cmd/golangci-lint@latest run ./... && go run golang.org/x/vuln/cmd/govulncheck@latest ./... && go run github.com/zricethezav/gitleaks/v8@latest detect --log-opts=--all"
agent:
  - codex
  - claude
