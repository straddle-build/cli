version: 2
project_name: straddle

changelog:
  use: github

builds:
  - id: straddle
    main: ./cmd/straddle
    binary: straddle
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X github.com/straddle-build/cli/internal/cli.version={{ .Version }}
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64

archives:
  - formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]
    files:
      - LICENSE
      - README.md
      - SKILL.md

checksum:
  name_template: checksums.txt

homebrew_casks:
  - name: straddle
    # HOMEBREW_TAP_GITHUB_TOKEN is not set on the repo yet (fine-grained
    # PAT for straddle-build/homebrew-tap, Contents R/W). Flip this to
    # false once the secret lands, then tag the next patch release to
    # publish the cask.
    skip_upload: true
    repository:
      owner: straddle-build
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    homepage: "https://github.com/straddle-build/cli"
    description: "Human and agent friendly CLI for the Straddle API"
    binaries:
      - straddle
    # Binaries are unsigned (no notarization): drop the quarantine
    # attribute at install so Gatekeeper does not block first run.
    hooks:
      post:
        install: |
          if system_command("/usr/bin/xattr", args: ["-h"]).exit_status == 0
            system_command "/usr/bin/xattr", args: ["-dr", "com.apple.quarantine", "#{staged_path}/straddle"]
          end
